version: "3.9"


x-env: &default-env
  MINIO_ENDPOINT: http://minio:9000
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  S3_BUCKET_RAW: eda-raw
  S3_BUCKET_PROFILES: eda-profiles
  S3_BUCKET_ARTIFACTS: eda-artifacts
  S3_BUCKET_OUTPUTS: eda-outputs
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: storyteller
  POSTGRES_USER: storyteller
  POSTGRES_PASSWORD: storyteller
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333


services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: storyteller
      POSTGRES_USER: storyteller
      POSTGRES_PASSWORD: storyteller
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyteller"]
      interval: 5s
      timeout: 5s
      retries: 10


  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20


  create-buckets:
    image: minio/mc:latest
    depends_on: { minio: { condition: service_healthy } }
    entrypoint: |
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin && \
      mc mb -p local/eda-raw || true && \
      mc mb -p local/eda-profiles || true && \
      mc mb -p local/eda-artifacts || true && \
      mc mb -p local/eda-outputs || true && \
      sleep 2 && mc ls local && sleep 1 && echo 'Buckets ready' && tail -f /dev/null"
  

  redis:
    image: redis:7
    ports: ["6379:6379"]


  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]


  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment: *default-env
    depends_on:
      - postgres
      - minio
    ports: ["8003:8003"]

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    environment: *default-env
    depends_on:
      - redis
      - gateway

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment: *default-env
    depends_on:
      - orchestrator
    command: ["bash", "-lc", "celery -A worker.celery_app.celery_app worker --loglevel=INFO"]

  insights:
    build:
      context: .
      dockerfile: insights/Dockerfile
    environment: *default-env
    ports: [ "8002:8002" ]


  apply:
    build:
      context: .
      dockerfile: apply/Dockerfile
    environment: *default-env
    ports: [ "8003:8003" ]
